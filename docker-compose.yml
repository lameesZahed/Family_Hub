version: '3.8'

services:
  db:
    image: postgres:15
    container_name: my_database_container
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: grad_db
    ports:
      - "5432:5432"

  backend:
    build: ./server
    container_name: my_backend_api
    ports:
      - "5000:3000"
    restart: always
    depends_on:
      - db